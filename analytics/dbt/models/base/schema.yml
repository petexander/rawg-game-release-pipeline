version: 2

models:
  - name: base_rawg__games_snapshot
    description: "Latest RAWG snapshot normalized to one row per game."
    columns:
      - name: game_id
        description: "RAWG game identifier for the latest snapshot."
        tests:
          - not_null
          - unique
      - name: game_name
        description: "Display name for the game."
        tests:
          - not_null
      - name: snapshot_date
        description: "Date the current snapshot was taken."
        tests:
          - not_null

  - name: base_rawg__game_platforms
    description: "Flattened game-platform bridge derived from RAWG platform JSON."
    columns:
      - name: game_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('base_rawg__games_snapshot')
                field: game_id
      - name: platform_name
        tests:
          - not_null

  - name: base_rawg__game_genres
    description: "Flattened game-genre bridge derived from RAWG genre JSON."
    columns:
      - name: game_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('base_rawg__games_snapshot')
                field: game_id
      - name: genre_name
        tests:
          - not_null

  - name: base_rawg__game_stores
    description: "Flattened game-store bridge derived from RAWG store JSON."

  - name: base_rawg__ingestion_runs
    description: "Raw ingestion metadata table."
