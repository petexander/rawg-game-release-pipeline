version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw ingestion tables loaded from the RAWG API into DuckDB."
    tables:
      - name: rawg_games_snapshot
        description: "Append-only daily RAWG snapshot with one row per game for the requested recent and upcoming release windows."
        columns:
          - name: snapshot_date
            description: "The logical run date for the snapshot."
          - name: game_id
            description: "RAWG game identifier."
          - name: platforms_json
            description: "Nested platform array stored as JSON text."
          - name: genres_json
            description: "Nested genre array stored as JSON text."
      - name: ingestion_runs
        description: "One row per ingestion attempt, including status, page counts, and load counts."
        columns:
          - name: run_id
            description: "Unique run identifier from the Python ingestion layer."
          - name: status
            description: "Final ingestion status."
