version: 2

models:
  - name: marts_games__release_calendar
    description: "Stakeholder-facing release calendar mart with one row per game in the latest snapshot."
    columns:
      - name: game_id
        description: "RAWG game identifier."
        tests:
          - not_null
          - unique
      - name: game_name
        description: "Rendered title name."
        tests:
          - not_null
      - name: release_bucket
        description: "Classification of the game as recent, upcoming, or tba."
        tests:
          - not_null
      - name: primary_platform
        description: "Selected primary platform used for reporting rollups."
      - name: genre_names
        description: "Comma-separated genre summary for the title."

  - name: marts_games__top_titles
    description: "Curated ranking slices for near-term report sections."
    columns:
      - name: title_group
        tests:
          - not_null
      - name: rank_in_group
        tests:
          - not_null
