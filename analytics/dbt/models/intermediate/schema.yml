version: 2

models:
  - name: int_games__release_cohorts
    description: "One row per game with release bucket, date windows, and reporting metrics."
    columns:
      - name: release_bucket
        tests:
          - not_null

  - name: int_games__platform_summary
    description: "Per-game platform rollup with a single primary platform and a rendered platform list."

  - name: int_games__genre_summary
    description: "Per-game genre rollup for final reporting."

  - name: int_games__monthly_platform_releases
    description: "Monthly trend aggregation by platform for the latest snapshot."
